            try {
                const response = await fetch('https://www.eporner.com/api/v2/video/id/?id=' + encodeURIComponent(id) + '&format=json');

                                (v.length_min ? '<span class="badge-duration">' + v.length_min + '</span>' : '') +
                                (v.rate ? '<span class="badge-rating">⭐ ' + v.rate + '</span>' : '') +
                                '<img src="' + thumb + '" alt="Thumbnail" loading="lazy" style="width: 100%; height: 100%; object-fit: cover; border-radius: 8px;" onload="this.classList.add(\'loaded\')" onerror="this.classList.add(\'loaded\'); this.style.background=\'#333\';">' +
                            '</div>' +
                            '<div class="card-meta">' +
                                '<div class="card-date-views">' +
                                    '<span style="color:var(--text-secondary);">📅 ' + added + '</span>' +
                                    '<span style="color:var(--text-secondary);">👁 ' + views + '</span>' +
                                '</div>' +
                                '<div class="card-title" style="color:#fff;">' + title + '</div>' +
                            '</div>';
                            
                        grid.appendChild(a);
                    });
                }
            } catch (err) {
                console.error("Error fetching similar videos:", err);
            }
        }

        function showError(msg) {
            const container = document.getElementById('videoContainer');
            container.innerHTML = '';
            
            const errDiv = document.createElement('div');
            errDiv.className = 'error-state';
            
            const h2 = document.createElement('h2');
            h2.textContent = 'Oops!';
            errDiv.appendChild(h2);
            
            const p = document.createElement('p');
            p.textContent = msg;
            errDiv.appendChild(p);
            
            const backBtn = document.createElement('a');
            backBtn.href = '/';
            backBtn.className = 'back-btn';
            backBtn.style.marginTop = '20px';
            backBtn.textContent = '← Back to Home';
            errDiv.appendChild(backBtn);
            
            container.appendChild(errDiv);
        }
    </script>
